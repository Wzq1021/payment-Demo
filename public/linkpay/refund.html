<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LinkPay Refund - Request a refund or check refund status.">
  <meta name="keywords" content="refund, LinkPay, payment solutions">
  <meta name="author" content="LinkPay">
  <title>LinkPay - 退款</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/linkpay/style.css">
</head>
<body class="bg-gray-50 font-sans flex flex-col min-h-screen dark:bg-gray-900 transition-colors duration-300">
  <!-- 加载遮罩 -->
  <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="loader"></div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="fixed top-4 right-4 max-w-xs bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-4 rounded-lg shadow-lg hidden transform translate-y-[-100%] transition-all duration-300 z-50">
    <p id="toast-message"></p>
  </div>

  <!-- 退款成功模态框 -->
  <div id="refund-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-8 max-w-md w-full shadow-lg animate-fade-in">
      <div class="flex items-center mb-4">
        <i class="fas fa-check-circle text-green-500 text-2xl mr-2"></i>
        <h3 class="text-xl font-semibold text-gray-800 dark:text-gray-100" data-i18n="refund_success">退款请求成功</h3>
      </div>
      <p class="text-gray-600 dark:text-gray-400 mb-4" data-i18n="modal_instruction">您的退款已提交，请保存交易号。</p>
      <p class="text-lg"><span data-i18n="trans_id">交易号</span>: <span id="modal-trans-id"></span></p>
      <div class="flex items-center mt-4">
        <button id="copy-modal-trans-id" class="bg-gray-200 text-gray-700 dark:bg-gray-600 dark:text-gray-300 px-3 py-1 rounded-md text-sm hover:bg-gray-300 dark:hover:bg-gray-500 transition transform hover:scale-105" data-i18n="copy">复制</button>
        <button id="close-modal" class="ml-4 bg-blue-600 text-white px-3 py-1 rounded-md text-sm hover:bg-blue-700 hover:shadow-lg transition transform hover:scale-105" data-i18n="close">关闭</button>
      </div>
    </div>
  </div>

  <!-- 顶部 -->
  <header class="bg-white dark:bg-gray-800 shadow-sm">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600 dark:text-blue-400" data-i18n="brand">LinkPay</h1>
      <div class="flex items-center space-x-4">
        <a href="/home.html" class="bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-300 px-3 py-1 rounded-md text-sm font-medium hover:bg-blue-200 dark:hover:bg-blue-800 transition" data-i18n="go_to_payment_options">返回支付选择</a>
        <a href="/linkpay/index.html" class="bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-300 px-3 py-1 rounded-md text-sm font-medium hover:bg-blue-200 dark:hover:bg-blue-800 transition" data-i18n="go_to_payment">返回支付</a>
        <select id="language-switch" class="border rounded-md px-2 py-1 text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="container mx-auto px-4 sm:px-6 py-12 flex-grow bg-gradient-to-r from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800">
    <!-- 退款区域 -->
    <div class="section bg-transparent rounded-xl shadow-lg p-6 sm:p-12 max-w-7xl mx-auto animate-slide-up flex flex-col md:flex-row gap-8">
      <!-- 退款申请 -->
      <div class="refund-box md:w-1/2 flex-none min-h-[450px]">
        <h2 class="text-3xl font-semibold text-gray-800 dark:text-gray-100 mb-6 flex items-center">
          <i class="fas fa-undo-alt text-blue-600 dark:text-blue-400 mr-2"></i>
          <span data-i18n="refund_title">退款申请</span>
        </h2>
        <p class="text-gray-600 dark:text-gray-400 mb-6 text-lg" data-i18n="refund_instruction">请输入订单号和退款金额以发起退款。</p>
        <div class="space-y-4">
          <div class="form-group">
            <label for="refund-order-id" class="block text-lg font-medium text-gray-700 dark:text-gray-300 mb-2" data-i18n="order_id">订单号</label>
            <input type="text" id="refund-order-id" class="w-full border rounded-md px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600" placeholder="DEMO_123456789">
            <p id="order-id-error" class="text-sm text-red-500 mt-1 hidden" data-i18n="invalid_order_id">订单号必须以 DEMO_ 开头</p>
          </div>
          <div class="form-group">
            <label for="refund-amount" class="block text-lg font-medium text-gray-700 dark:text-gray-300 mb-2" data-i18n="refund_amount">退款金额</label>
            <input type="number" id="refund-amount" class="w-full border rounded-md px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600" placeholder="100.00">
          </div>
          <button id="refund-btn" class="w-full bg-blue-600 text-white py-4 rounded-md text-lg font-medium hover:bg-blue-700 hover:shadow-lg transition disabled:bg-gray-400 dark:disabled:bg-gray-600 transform hover:scale-105" data-i18n="submit_refund">提交退款</button>
          <div id="refund-result" class="mt-4 status" data-i18n="refund_result"></div>
          <div id="refund-trans-id" class="mt-4 hidden">
            <p class="text-gray-600 dark:text-gray-400"><span data-i18n="trans_id">交易号</span>: <span id="trans-id-text"></span></p>
            <button id="copy-trans-id" class="bg-gray-200 text-gray-700 dark:bg-gray-600 dark:text-gray-300 px-3 py-1 rounded-md text-sm hover:bg-gray-300 dark:hover:bg-gray-500 transition transform hover:scale-105 mt-2" data-i18n="copy">复制</button>
          </div>
        </div>
      </div>
      <!-- 查询退款状态 -->
      <div class="refund-box md:w-1/2 flex-none min-h-[450px]">
        <h3 class="text-3xl font-semibold text-gray-800 dark:text-gray-100 mb-6 flex items-center">
          <i class="fas fa-search text-blue-600 dark:text-blue-400 mr-2"></i>
          <span data-i18n="check_refund_status">查询退款状态</span>
        </h3>
        <p class="text-gray-600 dark:text-gray-400 mb-6 text-lg" data-i18n="check_refund_instruction">请输入交易号以查询退款状态。</p>
        <div class="space-y-4">
          <div class="form-group">
            <label for="check-refund-id" class="block text-lg font-medium text-gray-700 dark:text-gray-300 mb-2" data-i18n="transaction_id">交易号</label>
            <input type="text" id="check-refund-id" class="w-full border rounded-md px-3 py-2 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600" placeholder="REF_123456789">
            <p id="trans-id-error" class="text-sm text-red-500 mt-1 hidden" data-i18n="invalid_trans_id">交易号必须以 REF_ 或 REFUND_ 开头</p>
          </div>
          <button id="check-refund-btn" class="w-full bg-blue-600 text-white py-4 rounded-md text-lg font-medium hover:bg-blue-700 hover:shadow-lg transition disabled:bg-gray-400 dark:disabled:bg-gray-600 transform hover:scale-105" data-i18n="check_status">查询状态</button>
          <div id="check-refund-result" class="mt-4 status" data-i18n="check_refund_result"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="bg-gray-800 text-white text-center py-8 mt-auto">
    <p data-i18n="footer">© 2025 LinkPay. 安全，快速的支付解决方案。</p>
    <div class="mt-2 text-sm">
      <a href="#" class="text-blue-300 hover:underline mx-2" data-i18n="about_us">关于我们</a> |
      <a href="mailto:support@linkpay.com" class="text-blue-300 hover:underline mx-2" data-i18n="contact">联系客服</a>
    </div>
  </footer>

  <script src="/linkpay/i18n.js"></script>
  <script src="/linkpay/script.js"></script>
</body>
</html>
