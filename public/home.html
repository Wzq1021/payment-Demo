<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choose your payment method: LinkPay or Dropin">
  <meta name="keywords" content="payment, LinkPay, Dropin">
  <meta name="author" content="Payment Solutions">
  <title>选择支付方式</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 font-sans flex flex-col min-h-screen transition-colors duration-300">
  <!-- 顶部 -->
  <header class="bg-white dark:bg-gray-800 shadow-sm">
    <div class="container mx-auto px-4 py-4 flex justify-end items-center">
      <select id="language-switch" class="border rounded-md px-2 py-1 text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="container mx-auto px-4 sm:px-6 py-12 flex-grow flex items-center justify-center">
    <div class="text-center max-w-2xl animate-fade-in">
      <h2 class="text-3xl font-semibold text-gray-800 dark:text-gray-100 mb-8" data-i18n="select_payment_method">请选择您的支付方式</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- LinkPay 选项 -->
        <a href="/linkpay/index.html" class="block bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 min-h-[150px] flex items-center justify-center hover:shadow-xl transition transform hover:scale-105">
          <h3 class="text-2xl font-medium text-gray-800 dark:text-gray-100" data-i18n="linkpay_option">LinkPay</h3>
        </a>
        <!-- Dropin 选项 -->
        <a href="/dropin/index.html" class="block bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 min-h-[150px] flex items-center justify-center hover:shadow-xl transition transform hover:scale-105">
          <h3 class="text-2xl font-medium text-gray-800 dark:text-gray-100" data-i18n="dropin_option">Dropin</h3>
        </a>
      </div>
    </div>
  </main>

  <script src="/linkpay/i18n.js"></script>
</body>
</html>
